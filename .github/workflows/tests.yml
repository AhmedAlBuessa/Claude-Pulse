name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      # The menubar extra (rumps/pyobjc) is macOS-only; tests import the
      # menu-bar logic without it, so dev deps are enough here.
      - run: uv sync --extra dev
      - run: uv run pytest -q
